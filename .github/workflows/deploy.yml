name: Deploy Edge

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Copy config to server
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "mkdir -p ~/edge"
          scp -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key docker-compose.yml ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/edge/docker-compose.yml
          scp -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key Caddyfile ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/edge/Caddyfile
          rm ~/.ssh/deploy_key

      - name: Deploy & reload Caddy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          script: |
            cd ~/edge
            docker network inspect web >/dev/null 2>&1 || docker network create web
            docker compose pull
            docker compose up -d
            # Konfig live neu einlesen, falls Container schon lief — keine Downtime
            docker compose exec -T caddy caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile || true
