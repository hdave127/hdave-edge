name: Deploy Edge

# Aktuell nur manueller Trigger, bis die FifthSeason-Migration durch ist
# (sonst kämpft die Edge-Caddy mit der alten FifthSeason-Caddy um :80/:443).
# Nach der Migration diesen Block zurück auf `push: branches: [main]` stellen.
on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Copy config to server
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "mkdir -p ~/edge"
          scp -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key docker-compose.yml ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/edge/docker-compose.yml
          scp -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key Caddyfile ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/edge/Caddyfile
          rm ~/.ssh/deploy_key

      - name: Deploy & reload Caddy
        uses: appleboy/ssh-action@v1
        env:
          ACME_EMAIL: ${{ secrets.ACME_EMAIL }}
          FIFTHSEASON_DOMAIN: ${{ secrets.FIFTHSEASON_DOMAIN }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: ACME_EMAIL,FIFTHSEASON_DOMAIN
          script_stop: true
          script: |
            cd ~/edge
            docker network inspect web >/dev/null 2>&1 || docker network create web
            printf "ACME_EMAIL=%s\nFIFTHSEASON_DOMAIN=%s\n" "$ACME_EMAIL" "$FIFTHSEASON_DOMAIN" > .env
            docker compose pull
            docker compose up -d
            # Falls der Container schon lief: Caddyfile neu einlesen (ohne Downtime)
            docker compose exec -T caddy caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile || true
